<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cfcfcf;
      border-radius: 10px;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 190px;
      overflow: hidden;
      background: linear-gradient(135deg, #e5e5e5, #bdbdbd);
    }

    #vehicle-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      transform: scale(1);
      transition: transform 220ms ease, filter 220ms ease;
    }

    .hero:hover #vehicle-image {
      transform: scale(1.045);
      filter: contrast(1.04) saturate(1.05);
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 90px;
      background: linear-gradient(to top,
          rgba(0, 0, 0, .72),
          rgba(0, 0, 0, 0));
      pointer-events: none;
    }

    .title {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      color: white;
    }

    .title h1 {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.05;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .55);
    }

    .title p {
      margin-top: 4px;
      font-size: 14px;
      opacity: .95;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .55);
    }

    .image-loading {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 12;
      color: #fff;
      display: none;
    }

    .image-loading-title {
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .55);
    }

    .progress-track {
      margin-top: 10px;
      height: 6px;
      width: 100%;
      border-radius: 99px;
      background: rgba(255, 255, 255, .35);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 99px;
      background: #ffffff;
      transition: width 350ms ease;
    }

    .content {
      padding: 18px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 16px;
      font-weight: bold;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #25c43d;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0% {
        opacity: .35;
        transform: scale(.85);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }

      100% {
        opacity: .35;
        transform: scale(.85);
      }
    }

    .row {
      padding: 14px 0;
      border-bottom: 1px solid #ececec;
    }

    .label {
      font-size: 11px;
      letter-spacing: .08em;
      color: #8b8b8b;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .value {
      font-size: 17px;
      font-weight: 500;
      color: #222;
    }
  </style>

</head>

<body>

  <div class="hero">

    <img
        id="vehicle-image"
        src=""
    >

    <div class="title">

      <h1 id="vehicle-name">

        Loading...

      </h1>

      <p id="vehicle-year">

      </p>

    </div>

    <div class="image-loading" id="image-loading">
      <div class="image-loading-title">Generating image...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

  </div>

  <div class="content">

    <div class="status">

      <span class="status-dot"></span>

      <span id="status">

            Active

        </span>

    </div>

    <div class="row">

      <div class="label">

        Customer

      </div>

      <div class="value" id="customer">

        -

      </div>

    </div>

    <div class="row">

      <div class="label">

        License Plate

      </div>

      <div class="value" id="licensePlate">

        -

      </div>

    </div>

    <div class="row">

      <div class="label">

        Transmission

      </div>

      <div class="value" id="transmission">

        -

      </div>

    </div>


    <div class="row">

      <div class="label">

        Fuel Type

      </div>

      <div class="value" id="fuelType">

        -

      </div>

    </div>

    <div class="row">

      <div class="label">

        Color

      </div>

      <div class="value" id="color">

        -

      </div>

    </div>

    <div class="row">

      <div class="label">

        Make

      </div>

      <div class="value" id="make">

        -

      </div>

    </div>

    <div class="row">

      <div class="label">

        Model

      </div>

      <div class="value" id="model">

        -

      </div>

    </div>

    <div class="row">

      <div class="label">

        Year

      </div>

      <div class="value" id="year">

        -

      </div>

    </div>

  </div>

  <script>
    let lastVehicleSignature = "";
let activeImageRequestKey = "";
let isLoadingVehicle = false;
let progressTimer = null;
let progressValue = 0;

function loadVehicle() {
  if (isLoadingVehicle) return;

  isLoadingVehicle = true;

  google.script.run
    .withSuccessHandler(function(vehicle) {
      isLoadingVehicle = false;
      renderVehicle(vehicle);
    })
    .withFailureHandler(function(error) {
      isLoadingVehicle = false;
      console.error(error);
    })
    .getVehicleViewerDataFast();
}


function renderVehicle(vehicle) {
  if (!vehicle) return;

  const signature = [
    vehicle.vehicleId,
    vehicle.expectedImageName,
    vehicle.imageFileId,
    vehicle.workOrder ? vehicle.workOrder.workOrderId : ""
  ].join("|");

  if (signature === lastVehicleSignature) return;

  lastVehicleSignature = signature;

  setText("vehicle-name", `${vehicle.make || ""} ${vehicle.model || ""}`.trim() || "Vehicle");
  setText("vehicle-year", vehicle.year || "");
  setText("customer", vehicle.customerName || "-");
  setText("licensePlate", vehicle.licensePlate || "-");
  setText("transmission", vehicle.transmission || "-");
  setText("fuelType", vehicle.fuelType || "-");
  setText("color", vehicle.color || "-");
  setText("make", vehicle.make || "-");
  setText("model", vehicle.model || "-");
  setText("year", vehicle.year || "-");
  setText("status", vehicle.status || "Unknown");

  renderStatus(vehicle.status);
  renderImage(vehicle);
}


function renderImage(vehicle) {
  const image = document.getElementById("vehicle-image");

  if (vehicle.imageFileId) {
    stopProgress();

    image.style.display = "block";
    image.src =
      "https://drive.google.com/thumbnail?id=" +
      vehicle.imageFileId +
      "&sz=w1200";

    document.getElementById("image-loading").style.display = "none";
    return;
  }

  image.removeAttribute("src");
  image.style.display = "none";

  showProgress();

  if (vehicle.imageStatus === "needs-generation") {
    startImageGeneration(vehicle);
  }
}


function startImageGeneration(vehicle) {
  const requestKey = vehicle.vehicleId + "|" + vehicle.expectedImageName;

  if (activeImageRequestKey === requestKey) return;

  activeImageRequestKey = requestKey;

  google.script.run
    .withSuccessHandler(function(result) {
      if (activeImageRequestKey !== requestKey) return;

      if (result && result.success && result.fileId) {
        stopProgress();
        loadVehicle();
        return;
      }

      if (result && result.stale) {
        loadVehicle();
        return;
      }

      console.error(result);
      stopProgress();
    })
    .withFailureHandler(function(error) {
      if (activeImageRequestKey !== requestKey) return;

      console.error(error);
      stopProgress();
    })
    .generateSelectedVehicleImage(
      vehicle.vehicleId,
      vehicle.expectedImageName
    );
}


function showProgress() {
  const loading = document.getElementById("image-loading");
  const fill = document.getElementById("progress-fill");

  loading.style.display = "block";
  progressValue = 8;
  fill.style.width = progressValue + "%";

  if (progressTimer) clearInterval(progressTimer);

  progressTimer = setInterval(function() {
    if (progressValue < 92) {
      progressValue += Math.max(1, Math.round((92 - progressValue) * 0.12));
      fill.style.width = progressValue + "%";
    }
  }, 450);
}


function stopProgress() {
  const loading = document.getElementById("image-loading");
  const fill = document.getElementById("progress-fill");

  if (progressTimer) {
    clearInterval(progressTimer);
    progressTimer = null;
  }

  fill.style.width = "100%";

  setTimeout(function() {
    loading.style.display = "none";
    fill.style.width = "0%";
  }, 250);
}


function renderStatus(status) {
  const dot = document.querySelector(".status-dot");

  dot.style.animation = "pulse 2s infinite";

  switch ((status || "").toLowerCase()) {
    case "active":
      dot.style.background = "#24C451";
      break;

    case "in repair":
      dot.style.background = "#3B82F6";
      break;

    case "waiting parts":
      dot.style.background = "#F59E0B";
      break;

    case "archived":
    case "inactive":
      dot.style.background = "#9CA3AF";
      dot.style.animation = "none";
      break;

    default:
      dot.style.background = "#9CA3AF";
      dot.style.animation = "none";
  }
}


function setText(id, value) {
  document.getElementById(id).textContent = value;
}


window.onload = function() {
  loadVehicle();
  setInterval(loadVehicle, 900);
};
  </script>

</body>

</html>
